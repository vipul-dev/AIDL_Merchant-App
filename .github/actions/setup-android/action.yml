name: "Setup Android Environment"

description: "Checkout code, install Java, restore Gradle cache and make gradlew executable"

runs:
  using: "composite"

  steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: Grant Execute Permission
      shell: bash
      run: chmod +x gradlew